<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedBoost - AI-Powered LinkedIn Post Writer</title>
    <meta name="description" content="Create engaging, viral-worthy LinkedIn posts in seconds with AI">
    <meta name="author" content="Ishann Patel">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .5;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 min-h-screen">
    <div class="p-6">
        <div class="max-w-4xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="flex items-center justify-center gap-2 mb-3">
                    <i data-lucide="sparkles" class="w-8 h-8 text-blue-600"></i>
                    <h1 class="text-4xl font-bold text-gray-900">LinkedBoost</h1>
                </div>
                <p class="text-gray-600">Create engaging, viral-worthy LinkedIn posts in seconds</p>
                <p class="text-sm text-gray-500 mt-2">Created by Ishann Patel</p>
            </div>

            <!-- Input Section -->
            <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-3">
                    What's your topic?
                </label>
                <div class="flex gap-3 mb-4">
                    <input
                        type="text"
                        id="topicInput"
                        placeholder="e.g., Leadership, AI in business, Career growth..."
                        class="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none"
                    />
                    <button
                        id="generateBtn"
                        class="px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors"
                    >
                        Generate
                    </button>
                </div>

                <!-- Topic Ideas Toggle -->
                <div class="flex gap-3">
                    <button
                        id="needIdeasBtn"
                        class="flex items-center gap-2 px-4 py-2 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 transition-colors"
                    >
                        <i data-lucide="lightbulb" class="w-4 h-4"></i>
                        Need Ideas?
                    </button>
                    <button
                        id="surpriseMeBtn"
                        class="flex items-center gap-2 px-4 py-2 bg-green-100 text-green-700 rounded-lg hover:bg-green-200 transition-colors"
                    >
                        <i data-lucide="trending-up" class="w-4 h-4"></i>
                        Surprise Me
                    </button>
                </div>

                <!-- Topic Categories -->
                <div id="topicIdeasSection" class="hidden mt-6 p-4 bg-gray-50 rounded-lg">
                    <h3 class="font-semibold text-gray-800 mb-3">Choose a topic category:</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="topicCategoriesContainer">
                        <!-- Categories will be inserted here -->
                    </div>
                </div>
            </div>

            <!-- Generated Post -->
            <div id="postSection" class="hidden bg-white rounded-2xl shadow-lg p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-gray-900">Your LinkedIn Post</h2>
                    <div class="flex gap-2">
                        <button
                            id="clearBtn"
                            class="px-4 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg transition-colors"
                        >
                            Clear
                        </button>
                        <button
                            id="copyBtn"
                            class="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors"
                        >
                            <i data-lucide="copy" class="w-4 h-4"></i>
                            <span>Copy</span>
                        </button>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-lg p-6 min-h-[200px]">
                    <div id="postContent" class="whitespace-pre-wrap text-gray-800 leading-relaxed select-text cursor-text"></div>
                </div>

                <div id="readyMessage" class="hidden mt-4 text-sm text-gray-600 text-center">
                    Ready to post? Copy and paste this into LinkedIn!
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Topic categories data
        const topicCategories = [
            { name: 'Leadership', topics: ['Effective Leadership', 'Team Management', 'Leading Through Change'] },
            { name: 'Career Growth', topics: ['Career Development', 'Skill Building', 'Professional Networking'] },
            { name: 'AI & Tech', topics: ['AI in Business', 'Digital Transformation', 'Future of Work'] },
            { name: 'Productivity', topics: ['Time Management', 'Work Efficiency', 'Focus Strategies'] },
            { name: 'Entrepreneurship', topics: ['Starting a Business', 'Innovation', 'Risk Taking'] },
            { name: 'Work-Life Balance', topics: ['Mental Health at Work', 'Burnout Prevention', 'Workplace Wellness'] }
        ];

        // State
        let isLoading = false;
        let generatedPost = '';

        // DOM Elements
        const topicInput = document.getElementById('topicInput');
        const generateBtn = document.getElementById('generateBtn');
        const needIdeasBtn = document.getElementById('needIdeasBtn');
        const surpriseMeBtn = document.getElementById('surpriseMeBtn');
        const topicIdeasSection = document.getElementById('topicIdeasSection');
        const topicCategoriesContainer = document.getElementById('topicCategoriesContainer');
        const postSection = document.getElementById('postSection');
        const postContent = document.getElementById('postContent');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const readyMessage = document.getElementById('readyMessage');

        // Render topic categories
        function renderTopicCategories() {
            topicCategoriesContainer.innerHTML = topicCategories.map(category => `
                <div class="bg-white p-4 rounded-lg">
                    <h4 class="font-semibold text-blue-600 mb-2">${category.name}</h4>
                    <div class="space-y-2">
                        ${category.topics.map(topic => `
                            <button
                                onclick="selectTopic('${topic}')"
                                class="block w-full text-left px-3 py-2 text-sm text-gray-700 hover:bg-blue-50 rounded transition-colors"
                            >
                                ${topic}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Toggle topic ideas
        needIdeasBtn.addEventListener('click', () => {
            topicIdeasSection.classList.toggle('hidden');
            if (!topicIdeasSection.classList.contains('hidden')) {
                renderTopicCategories();
            }
        });

        // Surprise Me
        surpriseMeBtn.addEventListener('click', () => {
            const allTopics = topicCategories.flatMap(cat => cat.topics);
            const randomTopic = allTopics[Math.floor(Math.random() * allTopics.length)];
            selectTopic(randomTopic);
        });

        // Select topic
        function selectTopic(topic) {
            topicInput.value = topic;
            generatePost(topic);
            topicIdeasSection.classList.add('hidden');
        }

        // Generate post
        async function generatePost(selectedTopic) {
            const topic = selectedTopic || topicInput.value.trim();
            
            if (!topic) {
                showPost('⚠️ Please enter a topic first!');
                return;
            }

            setLoading(true);
            topicIdeasSection.classList.add('hidden');

            // Retry logic
            let attempts = 0;
            const maxAttempts = 2;

            while (attempts < maxAttempts) {
                try {
                    attempts++;
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 30000);

                    // Call our Vercel serverless function instead of direct API
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        signal: controller.signal,
                        body: JSON.stringify({ topic })
                    });

                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        if (errorData.error === 'RATE_LIMIT') throw new Error('RATE_LIMIT');
                        if (errorData.error === 'AUTH_ERROR') throw new Error('AUTH_ERROR');
                        if (errorData.error === 'SERVER_ERROR') throw new Error('SERVER_ERROR');
                        if (errorData.error === 'EMPTY_CONTENT') throw new Error('EMPTY_CONTENT');
                        if (errorData.error === 'NO_TEXT_CONTENT') throw new Error('NO_TEXT_CONTENT');
                        throw new Error(`API_ERROR_${response.status}`);
                    }

                    const data = await response.json();
                    
                    if (!data.content) throw new Error('NO_TEXT_CONTENT');
                    
                    const postText = data.content.trim();
                    
                    if (!postText) throw new Error('NO_TEXT_CONTENT');
                    
                    showPost(postText);
                    setLoading(false);
                    return;
                    
                } catch (error) {
                    console.error(`Attempt ${attempts} failed:`, error);
                    
                    if (attempts >= maxAttempts) {
                        let errorMessage = '❌ Unable to generate your post.\n\n';
                        
                        if (error.name === 'AbortError') {
                            errorMessage += '⏱️ Request timeout: The service is taking too long to respond.\n\nTry:\n• Using a simpler topic\n• Checking your internet connection\n• Trying again in a moment';
                        } else if (error.message === 'RATE_LIMIT') {
                            errorMessage += '🚦 Too many requests: You\'ve hit the rate limit.\n\nPlease wait a minute and try again.';
                        } else if (error.message === 'AUTH_ERROR') {
                            errorMessage += '🔐 Authentication issue: There\'s a problem with the API connection.\n\nPlease refresh the page and try again.';
                        } else if (error.message === 'SERVER_ERROR') {
                            errorMessage += '🔧 Server error: The AI service is temporarily unavailable.\n\nPlease try again in a few minutes.';
                        } else if (error.message.includes('INVALID_RESPONSE') || error.message.includes('EMPTY_CONTENT') || error.message.includes('NO_TEXT_CONTENT')) {
                            errorMessage += '📭 Empty response: The AI didn\'t generate content.\n\nPlease try again with a different topic.';
                        } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                            errorMessage += '🌐 Connection error: Unable to reach the service.\n\nCheck your internet connection and try again.';
                        } else {
                            errorMessage += '⚠️ Something went wrong.\n\nPlease:\n• Refresh the page\n• Try a different topic\n• Check your internet connection';
                        }
                        
                        showPost(errorMessage);
                        setLoading(false);
                        return;
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
            }
        }

        // Show post
        function showPost(text) {
            generatedPost = text;
            postContent.textContent = text;
            postSection.classList.remove('hidden');
            readyMessage.classList.remove('hidden');
        }

        // Set loading state
        function setLoading(loading) {
            isLoading = loading;
            generateBtn.disabled = loading;
            generateBtn.textContent = loading ? 'Generating...' : 'Generate';
            surpriseMeBtn.disabled = loading;
            
            if (loading) {
                postSection.classList.remove('hidden');
                postContent.innerHTML = '<div class="flex items-center justify-center h-full"><div class="animate-pulse text-gray-600">Crafting your perfect post...</div></div>';
                readyMessage.classList.add('hidden');
            }
        }

        // Copy post
        async function copyPost() {
            try {
                const tempDiv = document.createElement('div');
                tempDiv.textContent = generatedPost;
                tempDiv.style.position = 'absolute';
                tempDiv.style.left = '-9999px';
                document.body.appendChild(tempDiv);
                
                const range = document.createRange();
                range.selectNodeContents(tempDiv);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                
                let success = false;
                
                try {
                    await navigator.clipboard.writeText(generatedPost);
                    success = true;
                } catch (e) {
                    try {
                        success = document.execCommand('copy');
                    } catch (e2) {}
                }
                
                selection.removeAllRanges();
                document.body.removeChild(tempDiv);
                
                if (success) {
                    const copyIcon = copyBtn.querySelector('[data-lucide]');
                    const copyText = copyBtn.querySelector('span');
                    copyIcon.setAttribute('data-lucide', 'check');
                    copyText.textContent = 'Copied!';
                    copyText.classList.add('text-green-600');
                    lucide.createIcons();
                    
                    setTimeout(() => {
                        copyIcon.setAttribute('data-lucide', 'copy');
                        copyText.textContent = 'Copy';
                        copyText.classList.remove('text-green-600');
                        lucide.createIcons();
                    }, 2000);
                } else {
                    alert('Copy failed. Please select and copy the text manually.');
                }
            } catch (err) {
                alert('Copy failed. Please select and copy the text manually.');
            }
        }

        // Clear post
        function clearPost() {
            generatedPost = '';
            topicInput.value = '';
            postSection.classList.add('hidden');
            postContent.textContent = '';
        }

        // Event listeners
        generateBtn.addEventListener('click', () => generatePost());
        topicInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generatePost();
        });
        copyBtn.addEventListener('click', copyPost);
        clearBtn.addEventListener('click', clearPost);
    </script>
</body>
</html>
